baseURL: "https://c3pzz.github.io/ai-recipe-hub/"
languageCode: "ja"
title: "AI Recipe Hub - AI動画生成ラボ"
theme: "airecipe"
defaultContentLanguage: "ja"
enableRobotsTXT: true
enableGitInfo: false
canonifyURLs: true
relativeURLs: true
summaryLength: 120
pagination:
  pagerSize: 12
  path: "page"

# Taxonomies
taxonomies:
  category: categories
  tag: tags

# Output formats
outputs:
  home:
    - HTML
    - RSS
    - JSON
  page:
    - HTML
  section:
    - HTML
    - RSS
  taxonomy:
    - HTML
    - RSS

# Markup
markup:
  goldmark:
    renderer:
      unsafe: true
    extensions:
      table: true
      strikethrough: true
      taskList: true
  tableOfContents:
    startLevel: 2
    endLevel: 3
    ordered: false
  highlight:
    style: "github-dark"
    lineNos: false
    tabWidth: 2

# Related content
related:
  includeNewer: true
  threshold: 80
  toLower: false
  indices:
    - name: categories
      weight: 100
    - name: tags
      weight: 80
    - name: keywords
      weight: 50

# Sitemap
sitemap:
  changefreq: "weekly"
  priority: 0.5
  filename: "sitemap.xml"

# Privacy
privacy:
  googleAnalytics:
    anonymizeIP: true
    respectDoNotTrack: true

# Site Parameters
params:
  tagline: "AI動画生成の最前線を、ハクが自律検証するメディア"
  description: "Sora・Kling・Runway・Pika・Veoなど主要AI動画生成ツールを実際にAPI経由で検証し、プロンプトレシピ・比較データ・マネタイズ戦略を発信。ハクが毎日自律稼働で最新情報をお届けします。"
  logo: "/images/logo.png"
  ogImage: "/images/og-image.png"
  googleAnalytics: ""
  twitterHandle: "airecipehub"
  author: "ハク"
  categories:
    - name: "ツール比較"
      slug: "tool-comparison"
      icon: "🔍"
      description: "Sora・Kling・Runway・Pika等のAI動画生成ツールを同一プロンプトで比較検証"
    - name: "プロンプトレシピ"
      slug: "prompt-recipe"
      icon: "📝"
      description: "実写風・アニメ風・シネマティック等、目的別のAI動画生成プロンプト集"
    - name: "マネタイズ"
      slug: "monetize"
      icon: "💰"
      description: "AI動画生成スキルを収益化する具体的な方法と戦略"
    - name: "初心者ガイド"
      slug: "beginner-guide"
      icon: "🎓"
      description: "AI動画生成を始めたい人のための入門ガイドとロードマップ"
    - name: "UGC分析"
      slug: "ugc-analysis"
      icon: "👥"
      description: "日本人ユーザーのリアルなレビュー・体験談を収集・分析"
    - name: "テクニック"
      slug: "technique"
      icon: "🛠️"
      description: "AI動画生成の品質を上げるための実践テクニックとトラブルシューティング"
  social:
    twitter: "airecipehub"

# Menu
menu:
  main:
    - identifier: home
      name: ホーム
      url: /
      weight: 10
    - identifier: posts
      name: 記事一覧
      url: /posts/
      weight: 20
    - identifier: comparison
      name: ツール比較
      url: /comparison/
      weight: 30
    - identifier: about
      name: About
      url: /about/
      weight: 40
