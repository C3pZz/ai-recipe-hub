name: Auto Generate Articles

on:
  schedule:
    # 毎日 09:00 JST (00:00 UTC) に実行
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      tool_name:
        description: '記事を生成するAIツール名 (空欄の場合は自動選択)'
        required: false
        type: string
      category:
        description: 'カテゴリ'
        required: false
        type: choice
        options:
          - 自動選択
          - 文章生成AI
          - 画像生成AI
          - コーディングAI
          - 業務効率化AI
          - マーケティングAI

# 停止スイッチ: このワークフローを無効化することで記事生成を停止できます
# GitHub Actions > Auto Generate Articles > Disable workflow

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    name: Generate Article with OpenAI
    runs-on: ubuntu-latest
    # APIコスト上限チェック: 月間コストが$10を超えた場合は停止
    # (実装は scripts/check_cost.py で行う)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install openai requests python-frontmatter pyyaml

      - name: Check API cost limit (Stop Switch)
        run: |
          python3 scripts/check_cost_limit.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          COST_LIMIT_USD: ${{ vars.MONTHLY_COST_LIMIT_USD || '10' }}
        continue-on-error: false

      - name: Collect AI tool information
        run: |
          python3 scripts/collect_tools.py
        env:
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}

      - name: Generate article with OpenAI
        run: |
          python3 scripts/generate_article.py \
            --tool-name "${{ inputs.tool_name || '' }}" \
            --category "${{ inputs.category || '自動選択' }}"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}

      - name: Log generation result
        run: |
          python3 scripts/log_generation.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push new article
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add content/posts/
          git add logs/
          if git diff --staged --quiet; then
            echo "No new articles generated."
          else
            git commit -m "🤖 Auto-generate: $(date '+%Y-%m-%d') 記事自動生成"
            git push
          fi

  # 記事生成後、自動でデプロイワークフローがトリガーされます
  # (pushイベントでdeploy.ymlが起動)
